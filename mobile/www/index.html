<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>我的追星日记</title>
    <style>
      :root {
        color: #433a3d;
        background: #f8f6f2;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
        text-align: center;
      }

      main {
        max-width: 420px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(67, 58, 61, 0.08);
        border-radius: 12px;
        box-shadow: 0 18px 48px rgba(67, 58, 61, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 26px;
      }

      p {
        margin: 0;
        color: #8e8387;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>我的追星日记</h1>
      <p>请先在 Capacitor 配置里填写网站地址，或使用本地开发地址运行 App。</p>
    </main>
  </body>
</html>
